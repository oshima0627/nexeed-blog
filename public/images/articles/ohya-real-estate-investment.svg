<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
    <stop offset="50%" stop-color="#14532d"/>
    <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    
        <pattern id="pat" x="0" y="0" width="190" height="95" patternUnits="userSpaceOnUse" patternTransform="rotate(10 600 315)">
          <path d="M0 47.5 Q 47.5 0 95 47.5 T 190 47.5" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.23"/>
        </pattern>
  </defs>

  <!-- 背景グラデーション -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- パターンオーバーレイ -->
  <rect width="1200" height="630" fill="url(#pat)"/>

  <!-- アクセントシェイプ -->
  <circle cx="995" cy="245" r="135" fill="#4ade80" opacity="0.08"/>
  <circle cx="395" cy="545" r="105" fill="#fbbf24" opacity="0.10"/>
  <line x1="0" y1="295" x2="300" y2="395" stroke="#4ade80" stroke-width="2" opacity="0.15"/>
  <rect x="895" y="545" width="80" height="80" fill="#fbbf24" opacity="0.07" rx="8"/>

  <!-- 左側のアクセントバー -->
  <rect x="0" y="0" width="6" height="630" fill="#4ade80" opacity="0.8"/>

  <!-- ボトムライン -->
  <rect x="0" y="610" width="1200" height="2" fill="#4ade80" opacity="0.3"/>

  <!-- カテゴリーバッジ -->
  <rect x="60" y="60" width="84" height="40" rx="20" fill="#4ade80" opacity="0.2"/>
  <rect x="60" y="60" width="84" height="40" rx="20" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <text x="80" y="87" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', Arial, sans-serif" font-size="18" fill="#4ade80" font-weight="600">投資</text>
</svg>