<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
    <stop offset="50%" stop-color="#2d2d44"/>
    <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    
        <pattern id="pat" x="0" y="0" width="41" height="41" patternUnits="userSpaceOnUse" patternTransform="rotate(222 600 315)">
          <circle cx="20.5" cy="20.5" r="2" fill="#a78bfa" opacity="0.22999999999999998"/>
        </pattern>
  </defs>

  <!-- 背景グラデーション -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- パターンオーバーレイ -->
  <rect width="1200" height="630" fill="url(#pat)"/>

  <!-- アクセントシェイプ -->
  <circle cx="1082" cy="232" r="182" fill="#a78bfa" opacity="0.08"/>
  <circle cx="382" cy="532" r="92" fill="#34d399" opacity="0.10"/>
  <line x1="0" y1="382" x2="300" y2="482" stroke="#a78bfa" stroke-width="2" opacity="0.15"/>
  <rect x="982" y="532" width="80" height="80" fill="#34d399" opacity="0.07" rx="8"/>

  <!-- 左側のアクセントバー -->
  <rect x="0" y="0" width="6" height="630" fill="#a78bfa" opacity="0.8"/>

  <!-- ボトムライン -->
  <rect x="0" y="610" width="1200" height="2" fill="#a78bfa" opacity="0.3"/>

  <!-- カテゴリーバッジ -->
  <rect x="60" y="60" width="128" height="40" rx="20" fill="#a78bfa" opacity="0.2"/>
  <rect x="60" y="60" width="128" height="40" rx="20" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <text x="80" y="87" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', Arial, sans-serif" font-size="18" fill="#a78bfa" font-weight="600">スポーツ</text>
</svg>