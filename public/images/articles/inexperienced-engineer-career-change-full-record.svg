<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="50%" stop-color="#1e3a5f"/>
    <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    
        <pattern id="pat" x="0" y="0" width="49" height="49" patternUnits="userSpaceOnUse" patternTransform="rotate(39 600 315)">
          <line x1="0" y1="0" x2="49" y2="49" stroke="#38bdf8" stroke-width="1" opacity="0.16999999999999998"/>
          <line x1="0" y1="49" x2="49" y2="0" stroke="#38bdf8" stroke-width="1" opacity="0.16999999999999998"/>
        </pattern>
  </defs>

  <!-- 背景グラデーション -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- パターンオーバーレイ -->
  <rect width="1200" height="630" fill="url(#pat)"/>

  <!-- アクセントシェイプ -->
  <circle cx="969" cy="169" r="189" fill="#38bdf8" opacity="0.08"/>
  <circle cx="169" cy="469" r="79" fill="#818cf8" opacity="0.10"/>
  <line x1="0" y1="269" x2="300" y2="369" stroke="#38bdf8" stroke-width="2" opacity="0.15"/>
  <rect x="869" y="519" width="80" height="80" fill="#818cf8" opacity="0.07" rx="8"/>

  <!-- 左側のアクセントバー -->
  <rect x="0" y="0" width="6" height="630" fill="#38bdf8" opacity="0.8"/>

  <!-- ボトムライン -->
  <rect x="0" y="610" width="1200" height="2" fill="#38bdf8" opacity="0.3"/>

  <!-- カテゴリーバッジ -->
  <rect x="60" y="60" width="194" height="40" rx="20" fill="#38bdf8" opacity="0.2"/>
  <rect x="60" y="60" width="194" height="40" rx="20" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <text x="80" y="87" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', Arial, sans-serif" font-size="18" fill="#38bdf8" font-weight="600">ITエンジニア</text>
</svg>