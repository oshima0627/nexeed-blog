<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
    <stop offset="50%" stop-color="#16213e"/>
    <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    
        <pattern id="pat" x="0" y="0" width="136" height="68" patternUnits="userSpaceOnUse" patternTransform="rotate(8 600 315)">
          <polygon points="68,0 102,17 102,51 68,68 34,51 34,17" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.18"/>
        </pattern>
  </defs>

  <!-- 背景グラデーション -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- パターンオーバーレイ -->
  <rect width="1200" height="630" fill="url(#pat)"/>

  <!-- アクセントシェイプ -->
  <circle cx="1028" cy="128" r="128" fill="#e94560" opacity="0.08"/>
  <circle cx="128" cy="428" r="88" fill="#f59e0b" opacity="0.10"/>
  <line x1="0" y1="328" x2="300" y2="428" stroke="#e94560" stroke-width="2" opacity="0.15"/>
  <rect x="928" y="478" width="80" height="80" fill="#f59e0b" opacity="0.07" rx="8"/>

  <!-- 左側のアクセントバー -->
  <rect x="0" y="0" width="6" height="630" fill="#e94560" opacity="0.8"/>

  <!-- ボトムライン -->
  <rect x="0" y="610" width="1200" height="2" fill="#e94560" opacity="0.3"/>

  <!-- カテゴリーバッジ -->
  <rect x="60" y="60" width="84" height="40" rx="20" fill="#e94560" opacity="0.2"/>
  <rect x="60" y="60" width="84" height="40" rx="20" fill="none" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <text x="80" y="87" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', Arial, sans-serif" font-size="18" fill="#e94560" font-weight="600">副業</text>
</svg>