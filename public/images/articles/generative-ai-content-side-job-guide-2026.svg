<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
    <stop offset="50%" stop-color="#16213e"/>
    <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    
        <pattern id="pat" x="0" y="0" width="51" height="51" patternUnits="userSpaceOnUse" patternTransform="rotate(45 600 315)">
          <rect x="10.200000000000001" y="10.200000000000001" width="30.599999999999998" height="30.599999999999998" fill="#e94560" opacity="0.15"/>
        </pattern>
  </defs>

  <!-- 背景グラデーション -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- パターンオーバーレイ -->
