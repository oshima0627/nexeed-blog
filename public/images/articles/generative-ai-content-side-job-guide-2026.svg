  <rect x="851" y="501" width="80" height="80" fill="#f59e0b" opacity="0.07" rx="8"/>

  <!-- 左側のアクセントバー -->
  <rect x="0" y="0" width="6" height="630" fill="#e94560" opacity="0.8"/>

  <!-- ボトムライン -->
  <rect x="0" y="610" width="1200" height="2" fill="#e94560" opacity="0.3"/>

  <!-- カテゴリーバッジ -->
  <rect x="60" y="60" width="84" height="40" rx="20" fill="#e94560" opacity="0.2"/>
  <rect x="60" y="60" width="84" height="40" rx="20" fill="none" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <text x="80" y="87" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', Arial, sans-serif" font-size="18" fill="#e94560" font-weight="600">副業</text>
