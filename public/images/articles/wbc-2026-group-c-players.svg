        <pattern id="pat" x="0" y="0" width="72" height="72" patternUnits="userSpaceOnUse" patternTransform="rotate(212 600 315)">
          <polygon points="36,7.2 64.8,61.199999999999996 7.2,61.199999999999996" fill="#a78bfa" opacity="0.16"/>
